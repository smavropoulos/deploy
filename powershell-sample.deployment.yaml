env:
  APP_NAME: my-app
  VERSION: "1.0.0"
  ENVIRONMENT: staging

deploy:
  - name: System info
    type: powershell-deploy
    description: Gather system information via PowerShell
    config:
      commands: |
        Write-Host "Hostname: $env:COMPUTERNAME"
        Write-Host "OS: $((Get-CimInstance Win32_OperatingSystem).Caption)"
        Write-Host "PowerShell: $($PSVersionTable.PSVersion)"

  - name: Check environment
    type: powershell-deploy
    description: Validate environment variables
    config:
      commands: |
        Write-Host "App: ${APP_NAME}"
        Write-Host "Version: ${VERSION}"
        Write-Host "Environment: ${ENVIRONMENT}"
        if ("${ENVIRONMENT}" -eq "staging") {
            Write-Host "Deploying to STAGING - extra checks skipped" -ForegroundColor Yellow
        }

  - name: Create artifacts
    type: powershell-deploy
    description: Simulate artifact creation
    config:
      commands: |
        $buildDir = Join-Path $env:TEMP "${APP_NAME}-${VERSION}"
        Write-Host "Creating build directory: $buildDir"
        New-Item -ItemType Directory -Path $buildDir -Force | Out-Null
        "build-timestamp=$(Get-Date -Format o)" | Out-File (Join-Path $buildDir "build.info")
        Write-Host "Wrote build.info"
        Get-ChildItem $buildDir | ForEach-Object { Write-Host "  $_" }

  - name: Cleanup
    type: powershell-deploy
    description: Clean up temp artifacts
    config:
      commands: |
        $buildDir = Join-Path $env:TEMP "${APP_NAME}-${VERSION}"
        if (Test-Path $buildDir) {
            Remove-Item $buildDir -Recurse -Force
            Write-Host "Cleaned up $buildDir"
        } else {
            Write-Host "Nothing to clean"
        }
