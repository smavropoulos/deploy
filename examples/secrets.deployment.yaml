# Example: Secret redaction in deployment output.
#
# Demonstrates how the `secrets` field masks sensitive values from all
# output — descriptions, command output, and error messages.
#
# Usage:
#   deploy run -f examples/secrets.deployment.yaml
#   deploy run -f examples/secrets.deployment.yaml -e DB_PASS=real-password -e API_KEY=abc123

env:
  DB_HOST: localhost
  DB_USER: admin
  DB_PASS: ${DB_PASS:-"s3cret-p@ss"}
  API_KEY: ${API_KEY:-"demo-key-12345"}

secrets:
  - DB_PASS
  - API_KEY

deploy:
  - name: Show config
    description: Connecting to ${DB_HOST} as ${DB_USER} (password is redacted)
    command:
      - echo "Database host   = ${DB_HOST}"
      - echo "Database user   = ${DB_USER}"
      - echo "Database pass   = ${DB_PASS}"
      - echo "API key         = ${API_KEY}"

  - name: Run migration
    description: Running database migration
    command:
      - echo "Connecting to ${DB_HOST} with password ${DB_PASS}..."
      - echo "Migration complete."
