env:
  APP_NAME: warehouse-api
  VERSION: "3.2.1"
  ENVIRONMENT: production
  REPLICAS: "1"
  DEBUG: "false"
  REGION: us-west-2
  MAX_MEMORY: "512"

deploy:
  - name: Pre-flight checks
    description: "Running pre-flight for ${{ APP_NAME }} v${{ VERSION }} (${{ ENVIRONMENT }})"
    command:
      - echo "Checking ${{ APP_NAME }} readiness..."
      - echo "Version parts - major:${{ split(VERSION, '.')[0] }} minor:${{ split(VERSION, '.')[1] }} patch:${{ split(VERSION, '.')[2] }}"
      - echo "Region ${{ upper(REGION) }} selected"
      - |
        echo "Memory limit ${{ MAX_MEMORY }}MB (${{ int(MAX_MEMORY) > 256 ? 'high' : 'low' }} tier)"

  - name: Debug diagnostics
    description: Dump debug info
    when: DEBUG == "true"
    command:
      - echo "This should NOT run because DEBUG is false"

  - name: Validate config
    description: "Validating config for ${{ lower(ENVIRONMENT) }} with ${{ REPLICAS }} replicas"
    command:
      - |
        echo "Replicas requested - ${{ REPLICAS }} (${{ int(REPLICAS) >= 3 ? 'HA mode' : 'single mode' }})"
      - |
        echo "Version check - ${{ VERSION startsWith '3' ? 'v3 branch' : 'legacy branch' }}"
      - echo "App name length - ${{ len(APP_NAME) }} chars"
      - echo "Environment is prod - ${{ ENVIRONMENT == 'production' }}"

  - name: Build container
    description: "Building ${{ APP_NAME }}:${{ VERSION }}-${{ lower(REGION) }}"
    command:
      - echo "Building image ${{ APP_NAME }}:${{ VERSION }}"
      - |
        echo "Build context - ${{ APP_NAME + '/' + VERSION + '/' + ENVIRONMENT }}"
      - |
        echo "Image tag - ${{ APP_NAME + ':' + VERSION + '-' + lower(REGION) }}"

  - name: Security scan
    description: "Scanning ${{ APP_NAME }}:${{ VERSION }} for vulnerabilities"
    command:
      - echo "Starting CVE scan..."
      - echo "CRITICAL - CVE-2026-1234 found in base image!"
      - exit 1

  - name: Deploy canary
    description: "Deploying canary to ${{ REGION }}"
    command:
      - echo "This should NOT run because the security scan failed above"

  - name: Full rollout
    description: "Rolling out ${{ REPLICAS }} replicas to ${{ REGION }}"
    when: ENVIRONMENT == "production" and int(REPLICAS) >= 3
    command:
      - echo "This should also NOT run"

  - name: Notify team
    description: "Sending notification for ${{ APP_NAME }} release"
    command:
      - echo "This should NOT run either"
